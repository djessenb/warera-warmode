name: Daily snapshot

on:
  schedule:
    # Midnight UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Gather snapshot
        env:
          GATEWAY_API_KEY: warera-warmode
        run: |
          DATE=$(date -u +%F)
          echo "Gathering snapshot for $DATE"
          node scripts/gather-data.mjs --date "$DATE" --force

      - name: Commit and push snapshot
        run: |
          DATE=$(date -u +%F)
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add public/data/snapshots public/data/countries.json
          if git diff --cached --quiet; then
            echo 'No changes to commit'
            exit 0
          fi
          git commit -m "snapshot: $DATE"
          git push

  deploy:
    needs: snapshot
    uses: ./.github/workflows/firebase-hosting-merge.yml
    secrets: inherit
