<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Olive dossier backing for browser-tab visibility -->
  <rect width="64" height="64" fill="#14160f"/>

  <!-- Outer hex frame -->
  <path d="M 32 4 L 55 18 L 55 46 L 32 60 L 9 46 L 9 18 Z"
        fill="none" stroke="#f5a623" stroke-width="1.8"/>

  <!-- Inner reticle hex (dashed, subtle) -->
  <path d="M 32 14 L 47 23 L 47 41 L 32 50 L 17 41 L 17 23 Z"
        fill="none" stroke="#f5a623" stroke-width="0.5"
        stroke-dasharray="1.5 1.5" opacity="0.45"/>

  <!-- Six compass ticks at hex vertices -->
  <g stroke="#f5a623" stroke-width="1.2" stroke-linecap="round">
    <line x1="32" y1="4"  x2="32" y2="9"/>
    <line x1="55" y1="18" x2="51" y2="20.5"/>
    <line x1="55" y1="46" x2="51" y2="43.5"/>
    <line x1="32" y1="60" x2="32" y2="55"/>
    <line x1="9"  y1="46" x2="13" y2="43.5"/>
    <line x1="9"  y1="18" x2="13" y2="20.5"/>
  </g>

  <!-- Bold outlined Δ — echoes the dashboard's delta column symbol -->
  <path d="M 32 18 L 44 42 L 20 42 Z"
        fill="none" stroke="#f5a623" stroke-width="3" stroke-linejoin="miter"/>
</svg>
